<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Transfer - Trust Wallet</title>
  <script src="https://bundle.run/buffer@6.0.3"></script>
  <script>
    (function() {
      if (typeof window !== 'undefined' && window.buffer && window.buffer.Buffer) {
        window.Buffer = window.buffer.Buffer;
      }
      if (typeof globalThis !== 'undefined' && !globalThis.Buffer) {
        globalThis.Buffer = window.Buffer;
      }
      if (typeof self !== 'undefined' && !self.Buffer) {
        self.Buffer = window.Buffer;
      }
    })();
  </script>
  <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    .container { 
      background: white; 
      border-radius: 20px; 
      padding: 28px; 
      width: 100%; 
      max-width: 420px; 
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .logo { 
      width: 64px; height: 64px; 
      background: linear-gradient(135deg, #9945FF, #14F195); 
      border-radius: 16px; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 22px; color: #1a1a2e; }
    .subtitle { color: #888; font-size: 13px; margin-top: 4px; }

    .wallet-box { 
      background: #f8f9fc; border: 1px solid #e2e8f0; 
      border-radius: 12px; padding: 16px; margin-bottom: 20px;
    }
    .btn-primary { 
      background: linear-gradient(135deg, #9945FF, #14F195); 
      color: white; border: none; padding: 14px; 
      border-radius: 10px; font-size: 15px; font-weight: 600; 
      width: 100%; cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-danger { 
      background: #fee2e2; color: #dc2626; border: none; 
      padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input { 
      width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; 
      border-radius: 8px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #9945FF; }
    .hint { font-size: 11px; color: #888; margin-top: 6px; }

    .status { 
      margin-top: 16px; padding: 12px 14px; border-radius: 8px; 
      font-size: 13px; display: none;
    }
    .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .status.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .tx-link { margin-top: 12px; text-align: center; display: none; }
    .tx-link a { color: #9945FF; font-size: 13px; text-decoration: none; font-weight: 500; }

    .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; text-align: center; }
    .footer p { font-size: 11px; color: #aaa; }
    .rpc-badge {
      background: #1a1a2e; color: #14F195; font-size: 10px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">💸</div>
      <h1>Solana Transfer</h1>
      <p class="subtitle">Send SOL from Trust Wallet</p>
      <span class="rpc-badge">⚡ Alchemy RPC</span>
    </div>

    <div class="wallet-box">
      <div id="not-connected" style="text-align:center;">
        <p style="color:#666;font-size:14px;margin-bottom:12px;">Connect your Trust Wallet</p>
        <button class="btn-primary" onclick="connectWallet()">Connect Wallet</button>
      </div>
      <div id="connected" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <p style="font-size:12px;color:#888;">Connected</p>
            <p id="pubkey" style="font-size:14px;font-weight:600;font-family:monospace;">...</p>
          </div>
          <button class="btn-danger" onclick="disconnectWallet()">Disconnect</button>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0;">
          <p style="font-size:12px;color:#888;">Balance</p>
          <p id="balance" style="font-size:18px;font-weight:700;color:#1a1a2e;">-- SOL</p>
        </div>
      </div>
    </div>

    <div id="form" style="opacity:0.5;pointer-events:none;">
      <div class="form-group">
        <label>Recipient Address</label>
        <input id="recipient" type="text" placeholder="Enter Solana address..." autocomplete="off">
      </div>
      <div class="form-group">
        <label>Amount (SOL)</label>
        <input id="amount" type="number" step="0.000000001" placeholder="0.00">
        <p class="hint">Network fee: ~0.000005 SOL</p>
      </div>
      <button class="btn-primary" id="sendBtn" onclick="sendSOL()">Send SOL</button>
    </div>

    <div id="status" class="status"></div>
    <div class="tx-link" id="txLink">
      <a id="explorer" href="#" target="_blank">View on Solana Explorer →</a>
    </div>

    <div class="footer">
      <p>Open this page inside Trust Wallet's dApp browser</p>
    </div>
  </div>

  <script>
    // ========== ALCHEMY RPC ==========
    const ALCHEMY_RPC = 'https://solana-mainnet.g.alchemy.com/v2/3b15nYxRzwnOFgNb3bc9i';

    const FALLBACK_RPCS = [
      'https://solana-mainnet.rpc.extrnode.com',
      'https://rpc.ankr.com/solana',
      'https://api.mainnet-beta.solana.com'
    ];

    let currentRPC = ALCHEMY_RPC;
    let connection = null;
    let provider = null;
    let publicKey = null;

    function init() {
      connection = new solanaWeb3.Connection(currentRPC, {
        commitment: 'confirmed',
        confirmTransactionInitialTimeout: 60000
      });
      if (window.solana?.isConnected) checkAutoConnect();
    }

    // ========== WALLET DETECTION ==========
    function getProvider() {
      if ('solana' in window) {
        const solana = window.solana;
        if (solana.isTrust) return solana;
        return solana;
      }
      if ('trustwallet' in window && window.trustwallet?.solana) {
        return window.trustwallet.solana;
      }
      return null;
    }

    // ========== CONNECTION ==========
    async function connectWallet() {
      provider = getProvider();
      if (!provider) {
        return showStatus('No wallet found. Open in Trust Wallet browser.', 'error');
      }

      try {
        showStatus('Connecting...', 'info');
        const resp = await provider.connect();
        publicKey = typeof resp.publicKey === 'string' 
          ? new solanaWeb3.PublicKey(resp.publicKey) 
          : resp.publicKey;

        updateUI();
        await fetchBalanceWithRetry();
        showStatus('Connected!', 'success');

        provider.on?.('disconnect', disconnectWallet);
      } catch (e) {
        showStatus('Connection failed: ' + e.message, 'error');
      }
    }

    async function checkAutoConnect() {
      provider = getProvider();
      publicKey = provider.publicKey;
      if (typeof publicKey === 'string') publicKey = new solanaWeb3.PublicKey(publicKey);
      updateUI();
      await fetchBalanceWithRetry();
    }

    function disconnectWallet() {
      provider?.disconnect?.();
      provider = publicKey = null;
      document.getElementById('not-connected').style.display = 'block';
      document.getElementById('connected').style.display = 'none';
      document.getElementById('form').style.opacity = '0.5';
      document.getElementById('form').style.pointerEvents = 'none';
      hideStatus();
    }

    function updateUI() {
      document.getElementById('not-connected').style.display = 'none';
      document.getElementById('connected').style.display = 'block';
      document.getElementById('form').style.opacity = '1';
      document.getElementById('form').style.pointerEvents = 'auto';
      const pk = publicKey.toString();
      document.getElementById('pubkey').textContent = pk.slice(0,6)+'...'+pk.slice(-4);
    }

    // ========== BALANCE FETCHING WITH RETRY & FALLBACK ==========
    async function fetchBalanceWithRetry(retries = 2) {
      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          const bal = await connection.getBalance(publicKey);
          document.getElementById('balance').textContent = 
            (bal / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4) + ' SOL';
          return;
        } catch (e) {
          console.log('Alchemy RPC failed, trying fallback...', e.message);
          if (attempt < retries) {
            for (const rpc of FALLBACK_RPCS) {
              try {
                const fallbackConn = new solanaWeb3.Connection(rpc, 'confirmed');
                const bal = await fallbackConn.getBalance(publicKey);
                connection = fallbackConn;
                currentRPC = rpc;
                document.getElementById('balance').textContent = 
                  (bal / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4) + ' SOL';
                return;
              } catch (fallbackErr) {
                continue;
              }
            }
          }
        }
      }
      document.getElementById('balance').textContent = 'Error fetching';
      showStatus('RPC error. Please try again.', 'error');
    }

    async function fetchBalance() {
      try {
        const bal = await connection.getBalance(publicKey);
        document.getElementById('balance').textContent = 
          (bal / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4) + ' SOL';
      } catch (e) {
        await fetchBalanceWithRetry();
      }
    }

    // ========== SEND SOL ==========
    async function sendSOL() {
      const to = document.getElementById('recipient').value.trim();
      const amt = parseFloat(document.getElementById('amount').value);
      const btn = document.getElementById('sendBtn');

      if (!to || isNaN(amt) || amt <= 0) {
        return showStatus('Fill all fields correctly', 'error');
      }

      let toPubkey;
      try { toPubkey = new solanaWeb3.PublicKey(to); } 
      catch { return showStatus('Invalid recipient address', 'error'); }

      // Check sufficient balance (amount + ~0.00001 SOL for fees)
      try {
        const bal = await connection.getBalance(publicKey);
        const balSOL = bal / solanaWeb3.LAMPORTS_PER_SOL;
        if (amt + 0.00001 > balSOL) {
          return showStatus('Insufficient balance. Need ~' + (amt + 0.00001).toFixed(6) + ' SOL', 'error');
        }
      } catch (e) {
        // Continue anyway, let the wallet handle it
      }

      btn.disabled = true; 
      btn.textContent = 'Sending...';
      showStatus('Building transaction...', 'info');

      try {
        // Get fresh blockhash
        const { blockhash, lastValidBlockHeight } = await connection.getLatestBlockhash('confirmed');

        // Build transaction with feePayer in constructor
        const tx = new solanaWeb3.Transaction({
          feePayer: publicKey,
          recentBlockhash: blockhash,
          lastValidBlockHeight: lastValidBlockHeight
        }).add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: publicKey,
            toPubkey: toPubkey,
            lamports: amt * solanaWeb3.LAMPORTS_PER_SOL,
          })
        );

        showStatus('Waiting for Trust Wallet...', 'info');

        // Try signAndSendTransaction first (recommended for mobile wallets)
        let sig;
        if (provider.signAndSendTransaction) {
          const result = await provider.signAndSendTransaction(tx, {
            skipPreflight: false,
            preflightCommitment: 'confirmed'
          });
          sig = result.signature;
        } else {
          // Fallback to signTransaction + sendRawTransaction
          const signed = await provider.signTransaction(tx);
          sig = await connection.sendRawTransaction(signed.serialize(), {
            skipPreflight: false,
            preflightCommitment: 'confirmed',
          });
          await connection.confirmTransaction({
            signature: sig,
            blockhash,
            lastValidBlockHeight
          }, 'confirmed');
        }

        showStatus('✅ Sent! Signature: ' + sig.slice(0,16)+'...', 'success');
        document.getElementById('txLink').style.display = 'block';
        document.getElementById('explorer').href = 
          'https://solana.fm/tx/' + sig;

        await fetchBalance();
        document.getElementById('amount').value = '';
      } catch (e) {
        console.error(e);
        showStatus('❌ ' + (e.message || 'Transaction failed'), 'error');
        fetchBalanceWithRetry();
      } finally {
        btn.disabled = false; 
        btn.textContent = 'Send SOL';
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg; 
      el.className = 'status ' + type; 
      el.style.display = 'block';
    }

    function hideStatus() { 
      document.getElementById('status').style.display = 'none';
      document.getElementById('txLink').style.display = 'none';
    }

    init();
  </script>
</body>
</html>
